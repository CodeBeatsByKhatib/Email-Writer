
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneCraft | تحويل النبرة واللغة بالذكاء الاصطناعي</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خط تجريدي مودرن (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-btn {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
            transition: all 0.3s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.7);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-brand-500 selection:text-white">

    <!-- Header Navigation -->
    <header class="border-b border-slate-800/80 backdrop-blur-md sticky top-0 z-50 bg-slate-950/80">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-indigo-500 flex items-center justify-center text-white shadow-lg shadow-brand-500/30">
                    <i class="fa-solid font-bold fa-wand-magic-sparkles text-lg"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-brand-500 bg-clip-text text-transparent">
                    ToneCraft
                </span>
            </div>
            
            <!-- Buy Me A Coffee Button -->
            <a href="https://www.buymeacoffee.com" target="_blank" class="flex items-center gap-2 bg-amber-500/10 border border-amber-500/30 text-amber-400 hover:bg-amber-500/20 px-3.5 py-1.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-300">
                <i class="fa-solid fa-mug-hot"></i>
                <span>اشترِ لي قهوة ☕</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8 md:py-12 flex-1 w-full flex flex-col justify-center">
        
        <!-- Hero Section -->
        <div class="text-center mb-8 space-y-3">
            <h1 class="text-3xl md:text-5xl font-black text-white leading-tight">
                اكتب أفكارك.. ودع الذكاء الأصطناعي <span class="bg-gradient-to-r from-brand-500 to-indigo-400 bg-clip-text text-transparent">يصقل النبرة واللغة</span>
            </h1>
            <p class="text-slate-400 text-sm md:text-base max-w-xl mx-auto">
                حول مسوداتك العشوائية أو رسائلك الغاضبة إلى إيميلات وردود احترافية، حاسمة، أو ودودة بأي لغة خلال ثوانٍ.
            </p>
        </div>

        <!-- Main Card Workspace -->
        <div class="glass-card rounded-2xl p-4 md:p-6 shadow-2xl space-y-6">
            
            <!-- Input Text Area -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-2">النص الأصلي (اكتب بأي طريقة أو لغة):</label>
                <textarea id="inputText" rows="4" dir="auto" 
                    class="w-full bg-slate-900/90 border border-slate-700/60 rounded-xl p-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all resize-none text-sm md:text-base"
                    placeholder="مثال: أنا زعلان من تأخير التسليم ولازم العميل يدفع الغرامة فوراً بدون أعذار..."></textarea>
            </div>

            <!-- Controls Grid (Tone & Language Options) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <!-- Tone Selection -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2">اختر نبرة الصوت (Tone):</label>
                    <select id="toneSelect" class="w-full bg-slate-900 border border-slate-700/60 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:border-brand-500">
                        <option value="Professional & Diplomatic">💼 دبلوماسي ورسمي (للإيميلات المهمة)</option>
                        <option value="Firm & Direct">🔥 حاسم ومباشر (لفرض الحدود والمطالبات)</option>
                        <option value="Friendly & Warm">🤝 ودود ولطيف (للعملاء الدائمين والزملاء)</option>
                        <option value="Persuasive & Sales">🚀 إقناعي وترويجي (للمبيعات والعروض)</option>
                    </select>
                </div>

                <!-- Target Language -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2">اللغة المطلوبة للنتيجة:</label>
                    <select id="langSelect" class="w-full bg-slate-900 border border-slate-700/60 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:border-brand-500">
                        <option value="English">🇬🇧 الإنكليزية (English)</option>
                        <option value="Arabic">🇸🇦 العربية (Arabic)</option>
                        <option value="German">🇩🇪 الألمانية (German)</option>
                        <option value="Spanish">🇪🇸 الإسبانية (Spanish)</option>
                        <option value="French">🇫🇷 الفرنسية (French)</option>
                    </select>
                </div>

            </div>

            <!-- Generate Button -->
            <button id="generateBtn" onclick="simulateAI()" class="w-full bg-gradient-to-r from-brand-600 to-indigo-600 text-white font-bold py-3.5 px-6 rounded-xl glow-btn flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-bolt text-amber-300"></i>
                <span>تحويل النص الآن</span>
            </button>

            <!-- Output Result Area (Hidden by default or empty) -->
            <div id="outputSection" class="hidden space-y-3 pt-4 border-t border-slate-800">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-semibold text-slate-400">النتيجة الاحترافية:</span>
                    <button onclick="copyToClipboard()" class="text-xs text-brand-500 hover:text-brand-400 flex items-center gap-1 font-semibold transition-colors">
                        <i class="fa-regular fa-copy"></i>
                        <span id="copyStatus">نسخ النص</span>
                    </button>
                </div>
                <div id="outputText" dir="auto" class="w-full bg-slate-900 border border-brand-500/30 rounded-xl p-4 text-slate-100 text-sm md:text-base leading-relaxed">
                    <!-- AI Output will appear here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800/80 py-6 text-center text-xs text-slate-500">
        <p>بُني بشغف بواسطة <span class="text-slate-300 font-bold">ToneCraft AI</span> • جميع الحقوق محفوظة</p>
    </footer>

    <!-- Temporary UI Script for testing -->
    <script>
        function simulateAI() {
            const input = document.getElementById('inputText').value;
            if(!input.trim()) {
                alert('الرجاء كتابة نص أولاً!');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const outputSec = document.getElementById('outputSection');
            const outputText = document.getElementById('outputText');

            // Show Loading State
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري التفكير والصياغة...`;
            btn.disabled = true;

            setTimeout(() => {
                // Temporary Simulation
                outputText.innerText = "Dear Client,\n\nI hope this email finds you well. I am writing to politely request an update regarding the pending payment for the completed project. As per our initial agreement, timely settlement is appreciated to maintain our workflow.\n\nBest regards,";
                
                outputSec.classList.remove('hidden');
                btn.innerHTML = `<i class="fa-solid fa-bolt text-amber-300"></i> <span>تحويل النص الآن</span>`;
                btn.disabled = false;
            }, 1200);
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            const copyStatus = document.getElementById('copyStatus');
            copyStatus.innerText = "تم النسخ! ✓";
            setTimeout(() => { copyStatus.innerText = "نسخ النص"; }, 2000);
        }
    </script>
</body>
</html>
